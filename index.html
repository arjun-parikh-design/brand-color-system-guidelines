*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --orange: #FF6C37;
  --orange-glow: rgba(255,108,55,0.12);
  --orange-border: rgba(255,108,55,0.22);
}
[data-theme="dark"] {
  --bg: #0a0a0a;
  --surface: #111111;
  --surface-2: #171717;
  --border: #242424;
  --border-light: #303030;
  --text-primary: #f0ede8;
  --text-secondary: #888;
  --text-muted: #555;
  --topbar-bg: rgba(10,10,10,0.94);
  --card-shadow: 0 32px 80px rgba(0,0,0,0.8), 0 4px 16px rgba(0,0,0,0.5);
}
[data-theme="light"] {
  --bg: #f5f2ef;
  --surface: #ffffff;
  --surface-2: #f0ece8;
  --border: #e0dbd5;
  --border-light: #cec8c0;
  --text-primary: #1a1612;
  --text-secondary: #5c5650;
  --text-muted: #9a9490;
  --topbar-bg: rgba(245,242,239,0.94);
  --card-shadow: 0 24px 64px rgba(0,0,0,0.1), 0 4px 12px rgba(0,0,0,0.06);
}

html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:var(--bg);
  font-family:'Inter', sans-serif;
  color:var(--text-primary);
  transition: background 0.25s, color 0.25s;
}

/* ── NAV ── */
#nav {
  position:fixed;
  top:0; left:0; right:0; height:76px;
  z-index:999;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 32px 0 28px;
  background:#000000;
  border-bottom:1px solid #1a1a1a;
}
.nav-left { display:flex; align-items:center; gap:18px; min-width:0; }
.nav-logo { display:flex; align-items:center; flex-shrink:0; }
.nav-logo svg { height:46px; width:auto; }
.nav-divider { width:1px; height:28px; background:#2e2e2e; flex-shrink:0; }
.nav-sub {
  font-family:'IBM Plex Mono',monospace;
  font-size:13px; font-weight:400;
  letter-spacing:0.09em; text-transform:uppercase;
  color:#888;
  white-space:nowrap;
  overflow:hidden; text-overflow:ellipsis;
}
.nav-right { display:flex; align-items:center; gap:14px; flex-shrink:0; }
.nav-counter {
  font-family:'IBM Plex Mono',monospace;
  font-size:12px; letter-spacing:0.06em;
  color:#888;
}

/* zoom */
#zoom-controls {
  display:flex; align-items:center; gap:0;
  border:1px solid #2e2e2e; border-radius:100px;
  padding:2px 4px; background:#111;
}
.zoom-btn {
  width:30px; height:30px; border:none; border-radius:100px;
  background:transparent; color:#888;
  font-size:17px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.zoom-btn:hover { background:#222; color:#f0ede8; }
.zoom-btn:disabled { opacity:0.2; cursor:default; background:transparent; }
#zoom-label {
  font-family:'IBM Plex Mono',monospace; font-size:11px;
  letter-spacing:0.05em; color:#888;
  min-width:38px; text-align:center; user-select:none;
}

/* grid btn */
#grid-btn {
  display:flex; align-items:center; gap:7px;
  padding:8px 18px;
  border:1px solid #2e2e2e; border-radius:100px;
  background:#111; color:#888;
  font-family:'Inter',sans-serif; font-size:12px; font-weight:500;
  letter-spacing:0.03em; cursor:pointer; transition:all 0.18s;
  white-space:nowrap;
}
#grid-btn:hover { border-color:var(--orange); color:var(--orange); background:rgba(255,108,55,0.1); }
#grid-btn.active { background:rgba(255,108,55,0.12); color:var(--orange); border-color:rgba(255,108,55,0.35); }
.grid-icon { display:grid; grid-template-columns:1fr 1fr; gap:2.5px; width:11px; height:11px; flex-shrink:0; }
.grid-icon span { display:block; background:currentColor; border-radius:0.5px; }

/* ── MOBILE NAV ── */
@media (max-width: 600px) {
  #nav { height:56px; padding:0 16px; }
  .nav-logo { padding:10px 0; }
  .nav-logo svg { height:24px !important; }
  .nav-sub { display:none; }
  .nav-divider { display:none; }
  .nav-counter { display:none; }
  #zoom-controls { display:none; }
  #grid-btn { padding:7px 14px; font-size:11px; }
  .grid-btn-label { display:none; }
}

/* ── VIEWPORT ── */
#vp {
  position:fixed; top:76px; left:0; right:0; bottom:0;
  overflow:hidden; background:#121212;
}

@media (max-width: 600px) {
  #vp { top:56px; }
}

/* ── DECK ── */
#deck-view {
  position:absolute; inset:0;
  overflow-y:scroll; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scroll-behavior:auto;
}
#deck-spacer { position:relative; }
#deck-stage {
  position:sticky; top:0; width:100%;
  display:flex; align-items:center; justify-content:center;
  background:#121212;
}

.deck-wrap {
  position:relative;
  width:min(92vw, 1080px);
  aspect-ratio:16/9;
  transform-origin:center center;
  transition:transform 0.3s cubic-bezier(0.16,1,0.3,1);
}

/* Shadow on img so it's contained within each card, never bleeds through siblings */
.dcard {
  position:absolute; inset:0;
  border-radius:10px;
  overflow:visible;
  border:none;
  will-change:transform, opacity;
  backface-visibility:hidden;
}
.dcard img {
  width:100%; height:100%;
  object-fit:cover; display:block;
  border-radius:10px;
  box-shadow: 0 6px 28px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.25);
  user-select:none; pointer-events:none;
}

/* ── SCRUBBER ── */
#scrubber {
  position:absolute; bottom:0; left:0; right:0; height:52px;
  display:flex; align-items:center; padding:0 36px; gap:24px;
  z-index:50;
}
#scrub-track {
  flex:1; height:4px; background:rgba(255,255,255,0.1); border-radius:4px;
  position:relative; cursor:pointer; margin-right:8px;
}
#scrub-fill {
  position:absolute; left:0; top:0; bottom:0;
  background:var(--orange); border-radius:4px;
  width:0%; pointer-events:none;
}
/* Stop dots — rendered outside track flow so track height can't squash them */
#scrub-stops {
  position:absolute;
  top:50%;
  left:0; right:0;
  height:0;
  pointer-events:none;
}
.scrub-stop {
  position:absolute;
  top:0;
  width:9px;
  height:9px;
  margin-top:-4.5px;
  margin-left:-4.5px;
  border-radius:50%;
  background:#3A3A3A;
  pointer-events:none;
  transition:background 0.15s, transform 0.15s;
  transform-origin:center center;
}
.scrub-stop.passed { background:var(--orange); }
.scrub-stop.active {
  background:var(--orange);
  transform:scale(1.8);
  box-shadow:0 0 0 4px rgba(255,108,55,0.22);
}
#scrub-label {
  font-family:'IBM Plex Mono',monospace; font-size:11px;
  letter-spacing:0.07em; color:rgba(255,255,255,0.3);
  white-space:nowrap; min-width:48px; text-align:right;
  pointer-events:none;
}
#scrub-tip {
  position:absolute; bottom:42px; transform:translateX(-50%);
  background:#1a1a1a; border:1px solid #333;
  border-radius:6px; padding:4px 10px;
  font-family:'IBM Plex Mono',monospace; font-size:10px;
  letter-spacing:0.05em; color:rgba(255,255,255,0.7);
  white-space:nowrap; pointer-events:none; opacity:0;
  transition:opacity 0.12s;
}
#scrubber:hover #scrub-tip { opacity:1; }

@media (max-width:600px) {
  #scrubber { padding:0 16px; height:44px; }
  .scrub-stop { width:7px; height:7px; }
  #scrub-label { display:none; }
}

/* ── GRID OVERVIEW ── */
#grid-view {
  position:absolute; inset:0;
  background:#121212; overflow-y:auto; overflow-x:hidden;
  opacity:0; pointer-events:none;
  transform:translateY(8px) scale(0.99);
  transform-origin:center top;
  transition:opacity 0.32s cubic-bezier(0.16,1,0.3,1),
              transform 0.32s cubic-bezier(0.16,1,0.3,1);
}
#grid-view.open {
  opacity:1; pointer-events:all;
  transform:translateY(0) scale(1);
}

.grid-header {
  padding:28px 36px 22px;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.08);
  position:sticky; top:0;
  background:rgba(18,18,18,0.97); backdrop-filter:blur(16px); z-index:10;
}
.gh-left h2 {
  font-family:'IBM Plex Mono',monospace;
  font-weight:400; font-size:10px;
  letter-spacing:0.12em; text-transform:uppercase;
  color:#ffffff;
}
.gh-left p {
  font-family:'IBM Plex Mono',monospace; font-size:10px;
  letter-spacing:0.12em; text-transform:uppercase;
  color:rgba(255,255,255,0.35); margin-top:5px;
}
#close-grid {
  display:flex; align-items:center; gap:7px;
  padding:8px 16px;
  border:1px solid rgba(255,255,255,0.2); border-radius:100px;
  background:rgba(0,0,0,0.2); color:rgba(255,255,255,0.75);
  font-family:'Inter',sans-serif; font-size:11px; font-weight:500;
  cursor:pointer; transition:all 0.18s;
}
#close-grid:hover { border-color:var(--orange); color:var(--orange); background:rgba(255,108,55,0.12); }

.grid-inner {
  padding:24px 36px 56px;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
  gap:16px;
}

.g-thumb {
  display:flex; flex-direction:column; gap:8px; cursor:pointer;
  opacity:0; transform:translateY(8px);
  transition:opacity 0.28s, transform 0.28s;
}
#grid-view.open .g-thumb { opacity:1; transform:translateY(0); }

.g-img {
  width:100%; aspect-ratio:16/9;
  border-radius:8px; overflow:hidden;
  border:1px solid rgba(0,0,0,0.2); position:relative;
  transition:border-color 0.18s, transform 0.18s, box-shadow 0.18s;
  background:#111;
}
.g-img img { width:100%; height:100%; object-fit:cover; display:block; }
.g-thumb:hover .g-img { border-color:var(--orange); transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,108,55,0.2); }
.g-thumb.cur .g-img { border-color:var(--orange); box-shadow:0 0 0 3px rgba(255,108,55,0.2); }

.g-meta { display:flex; justify-content:space-between; align-items:baseline; padding:0 2px; }
.g-title { font-size:11px; font-weight:400; color:rgba(255,255,255,0.7); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.g-num { font-family:'IBM Plex Mono',monospace; font-size:10px; color:rgba(255,255,255,0.4); letter-spacing:0.05em; flex-shrink:0; }

/* stagger */
#grid-view.open .g-thumb:nth-child(1)  { transition-delay:0ms }
#grid-view.open .g-thumb:nth-child(2)  { transition-delay:22ms }
#grid-view.open .g-thumb:nth-child(3)  { transition-delay:44ms }

<div id="vp">
  <div id="deck-view">

      <div id="deck-stage">
        <div class="deck-wrap" id="deck-wrap"></div>
        <div id="scrubber">

          </div>

<script>
const REAL_SLIDES = [
  "./01.jpg",
  "./02.jpg",
  "./03.jpg",
  "./04.jpg",
  "./05.jpg",
  "./06.jpg",
  "./07.jpg",
  "./08.jpg",
  "./09.jpg",
  "./10.jpg",
  "./11.jpg",
  "./12.jpg",
  "./13.jpg",
  "./14.jpg",
  "./15.jpg",
  "./16.jpg",
  "./17.jpg",
  "./18.jpg",
  "./19.jpg"
];
const SLIDE_TITLES = ["Postman Color System", "Postman Orange", "Core Colors", "Color Ranges", "Orange Tints & Shades", "Purple Tints & Shades", "Core Color Accessibility", "Neutrals", "Magenta Tints & Shades", "Gradients", "Accent Colors", "Blue Tints & Shades", "Yellow Tints & Shades", "Usage: Blog Illustrations", "Colorway Examples: Blog", "Usage: Social Posts", "Colorway Examples: Social", "Usage: Spot Illustrations", "Back Cover"];

const N = 19;
const PER = 280;

// ── DECK ──────────────────────────────────────────────────────────────────
const deckView   = document.getElementById('deck-view');
const deckWrap   = document.getElementById('deck-wrap');
const deckSpacer = document.getElementById('deck-spacer');
const deckStage  = document.getElementById('deck-stage');
const counterEl  = document.getElementById('nav-counter');
const scrubFill  = document.getElementById('scrub-fill');
const scrubLabel = document.getElementById('scrub-label');
const scrubTrack = document.getElementById('scrub-track');
const scrubTip   = document.getElementById('scrub-tip');
const scrubStops = document.getElementById('scrub-stops');

// Page numbers as they appear on the slides (cover has no number, slides 01-17, back cover = 18)
const SLIDE_NUMS = ['—','01','02','03','04','05','06','07','08','09','10','11','12','13','14','15','16','17','—'];

// Build stop dots
for (let i = 0; i < N; i++) {
  const dot = document.createElement('div');
  dot.className = 'scrub-stop';
  dot.style.left = (i / (N - 1) * 100).toFixed(2) + '%';
  dot.dataset.idx = i;
  scrubStops.appendChild(dot);
}
const stopDots = scrubStops.querySelectorAll('.scrub-stop');

let currentSlide = 0;

const NAV_H = () => window.innerWidth <= 600 ? 56 : 76;

function setupDeck() {
  const vh = window.innerHeight - NAV_H();
  deckStage.style.height = vh + 'px';
  deckSpacer.style.height = (vh + N * PER) + 'px';
  deckWrap.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const card = document.createElement('div');
    card.className = 'dcard';
    card.id = 'dc' + i;
    card.style.zIndex = N - i;
    const img = document.createElement('img');
    img.src = REAL_SLIDES[i];
    img.alt = SLIDE_TITLES[i];
    img.draggable = false;
    card.appendChild(img);
    deckWrap.appendChild(card);
  }
  tickDeck(deckView.scrollTop);
}

function tickDeck(scrollY) {
  const totalH = deckSpacer.offsetHeight - (window.innerHeight - NAV_H());
  const sp  = Math.min(Math.max(scrollY / totalH, 0), 1);
  const raw = sp * (N - 1);
  const idx = Math.min(Math.floor(raw), N - 1);
  const frac = raw - idx;
  const pct = sp * 100;
  scrubFill.style.width = pct + '%';
  const lbl = String(idx + 1).padStart(2, '0') + ' / 19';
  scrubLabel.textContent = lbl;
  counterEl.textContent  = lbl;

  // Update stop dots
  stopDots.forEach((dot, i) => {
    dot.classList.toggle('passed', i < idx);
    dot.classList.toggle('active', i === idx);
  });

  for (let i = 0; i < N; i++) {
    const card = document.getElementById('dc' + i);
    if (!card) continue;
    if (i < idx) {
      card.style.transform = 'translateY(-112%) rotate(-3deg)';
      card.style.opacity = '1';
      card.style.zIndex = i;
    } else if (i === idx) {
      const ty  = -(frac * 112);
      const rot = -(frac * 3);
      card.style.transform = 'translateY(' + ty + '%) rotate(' + rot + 'deg)';
      card.style.opacity = '1';
      card.style.zIndex = N + 2;
    } else {
      const d  = i - idx;
      const sc = Math.max(0.92, 1 - d * 0.018 + frac * 0.018);
      card.style.transform = 'scale(' + sc + ')';
      card.style.opacity = '1';
      card.style.zIndex = N - d + 1;
    }
  }
}

deckView.addEventListener('scroll', () => tickDeck(deckView.scrollTop), {passive:true});

// ── SCRUBBER ──────────────────────────────────────────────────────────────
function scrubToX(x) {
  const rect = scrubTrack.getBoundingClientRect();
  const f = Math.min(Math.max((x - rect.left) / rect.width, 0), 1);
  const totalH = deckSpacer.offsetHeight - (window.innerHeight - NAV_H());
  // Direct set — no smooth, so drag tracks finger/cursor exactly
  deckView.scrollTop = f * totalH;
}
function updateTip(x) {
  const rect = scrubTrack.getBoundingClientRect();
  const f = Math.min(Math.max((x - rect.left) / rect.width, 0), 1);
  const idx = Math.min(Math.round(f * (N-1)), N-1);
  scrubTip.style.left = (f * 100).toFixed(1) + '%';
  const pgNum = SLIDE_NUMS[idx];
  const pgLabel = pgNum === '—' ? (idx === 0 ? 'Cover' : 'Back Cover') : pgNum;
  scrubTip.textContent = pgNum === '—' ? pgLabel : pgLabel + ' — ' + SLIDE_TITLES[idx];
}

// Use pointer events — captured on pointerdown so drag works even outside track
scrubTrack.addEventListener('mousemove', e => updateTip(e.clientX));
scrubTrack.addEventListener('pointerdown', e => {
  e.preventDefault();
  scrubTrack.setPointerCapture(e.pointerId);
  scrubToX(e.clientX);
});
scrubTrack.addEventListener('pointermove', e => {
  if (!e.buttons) return;
  scrubToX(e.clientX);
  updateTip(e.clientX);
});
// Touch support for mobile
scrubTrack.addEventListener('touchstart', e => {
  e.preventDefault();
  scrubToX(e.touches[0].clientX);
}, {passive:false});
scrubTrack.addEventListener('touchmove', e => {
  e.preventDefault();
  scrubToX(e.touches[0].clientX);
  updateTip(e.touches[0].clientX);
}, {passive:false});

// ── ZOOM ──────────────────────────────────────────────────────────────────
const ZOOMS = [50,60,70,80,90,100,110,125,140,160,180,200];
let zoomIdx = 5;

function applyZoom() {
  const pct = ZOOMS[zoomIdx];
  deckWrap.style.transform = 'scale(' + (pct/100) + ')';
  document.getElementById('zoom-label').textContent = pct + '%';
  document.getElementById('zoom-in').disabled  = zoomIdx >= ZOOMS.length - 1;
  document.getElementById('zoom-out').disabled = zoomIdx <= 0;
}

window.adjustZoom = d => {
  zoomIdx = Math.min(Math.max(zoomIdx + d, 0), ZOOMS.length-1);
  applyZoom();
};

deckView.addEventListener('wheel', e => {
  if (!e.metaKey && !e.ctrlKey) return;
  e.preventDefault();
  adjustZoom(e.deltaY < 0 ? 1 : -1);
}, {passive:false});

// ── GRID ──────────────────────────────────────────────────────────────────
const gridView  = document.getElementById('grid-view');
const gridInner = document.getElementById('grid-inner');
let gridOpen = false;

function buildGrid() {
  gridInner.innerHTML = '';
  for (let i = 0; i < N; i++) {
    const thumb = document.createElement('div');
    thumb.className = 'g-thumb' + (i === currentSlide ? ' cur' : '');
    const img_wrap = document.createElement('div');
    img_wrap.className = 'g-img';
    const img = document.createElement('img');
    img.src = REAL_SLIDES[i];
    img.alt = SLIDE_TITLES[i];
    img.draggable = false;
    img_wrap.appendChild(img);
    const meta = document.createElement('div');
    meta.className = 'g-meta';
    meta.innerHTML = '<span class="g-title">' + SLIDE_TITLES[i] + '</span><span class="g-num">' + String(i+1).padStart(2,'0') + '</span>';
    thumb.appendChild(img_wrap);
    thumb.appendChild(meta);
    thumb.addEventListener('click', () => jumpTo(i));
    gridInner.appendChild(thumb);
  }
}
function toggleGrid() {
  gridOpen = !gridOpen;
  const btn = document.getElementById('grid-btn');
  if (gridOpen) {
    buildGrid();
    gridView.classList.add('open');
    btn.classList.add('active');
  } else {
    gridView.classList.remove('open');
    btn.classList.remove('active');
  }
}
function jumpTo(i) {
  gridView.classList.remove('open');
  document.getElementById('grid-btn').classList.remove('active');
  gridOpen = false;
  const totalH = deckSpacer.offsetHeight - (window.innerHeight - NAV_H());
  deckView.scrollTo({top: (i / (N-1)) * totalH, behavior:'smooth'});
}
window.toggleGrid = toggleGrid;

// ── INIT ──────────────────────────────────────────────────────────────────
setupDeck();
applyZoom();
window.addEventListener('resize', setupDeck);
</script>
